<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Livraison Tesla Model Y</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f7;--card:#fff;--border:#e0e0e0;--text:#1a1a1a;--sub:#6e6e73;
  --green:#1c9e5a;--green-bg:#eafaf2;--green-border:#a8e6c3;
  --orange:#c07000;--orange-bg:#fff8e6;--orange-border:#ffd470;
  --accent:#0071e3;--accent2:#005bb5;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--card:#2c2c2e;--border:#3a3a3c;--text:#f2f2f7;--sub:#8e8e93;
  --green:#30d158;--green-bg:#0d2d1a;--green-border:#1a5e35;
  --orange:#ffd60a;--orange-bg:#2a1f00;--orange-border:#7a5c00;
  --accent:#0a84ff;--accent2:#0060cc;--shadow:0 2px 12px rgba(0,0,0,.3);}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-inner{max-width:480px;margin:0 auto}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
.subtitle{font-size:12px;color:var(--sub);margin-top:2px}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease}
.prog-label{font-size:12px;color:var(--sub);margin-top:4px;text-align:right}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;scrollbar-width:none;max-width:480px;margin:0 auto}
.filter-row::-webkit-scrollbar{display:none}
.ftag{font-size:12px;font-weight:500;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;white-space:nowrap;transition:all .15s}
.ftag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
main{max-width:480px;margin:0 auto;padding:12px 16px;display:flex;flex-direction:column;gap:16px}
.section-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.sec-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.04em;color:var(--sub)}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.badge-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-warn{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
.item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative;user-select:none}
.item:last-child{border-bottom:none}
.item:active{background:var(--border)}
.item.ok{background:var(--green-bg)}
.item.issue{background:var(--orange-bg)}
.cb{width:22px;height:22px;min-width:22px;border-radius:6px;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.item.ok .cb{background:var(--green);border-color:var(--green)}
.item.issue .cb{background:var(--orange);border-color:var(--orange)}
.cb-inner{display:none;color:#fff;font-size:13px;font-weight:700}
.item.ok .cb-inner,.item.issue .cb-inner{display:block}
.item-text{flex:1;min-width:0}
.item-label{font-size:15px;font-weight:500;line-height:1.3}
.item.ok .item-label{color:var(--green)}
.item.issue .item-label{color:var(--orange)}
.item-note{font-size:12px;color:var(--sub);margin-top:3px;line-height:1.4}
.item-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.act-btn{font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid;cursor:pointer;font-weight:500;transition:all .15s}
.act-ok{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.act-issue{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-border)}
.act-reset{background:transparent;color:var(--sub);border-color:var(--border)}
.act-del{background:transparent;color:#d32f2f;border-color:#f4a7a7}
.items-wrap{display:flex;flex-direction:column}

/* Bouton ajouter dans la section */
.add-item-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px dashed var(--border);cursor:pointer;color:var(--accent);font-size:13px;font-weight:500;transition:background .1s}
.add-item-row:active{background:var(--border)}
.add-item-row .plus{width:22px;height:22px;border-radius:6px;border:1.5px dashed var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;color:var(--accent);flex-shrink:0}

/* Section perso */
.custom-sec-header{background:linear-gradient(135deg,#0071e315,#0071e308);border-left:3px solid var(--accent)}

/* FAB group */
.fab-group{position:fixed;bottom:24px;right:20px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;z-index:200}
.fab{width:52px;height:52px;border-radius:50%;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.2);cursor:pointer;border:none;transition:transform .15s}
.fab:active{transform:scale(.93)}
.fab-main{background:var(--accent)}
.fab-add{background:var(--green);box-shadow:0 4px 16px rgba(28,158,90,.35)}

/* Modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);max-height:85vh;overflow-y:auto}
.modal-bg.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:17px;font-weight:600;margin-bottom:4px}
.modal p{font-size:13px;color:var(--sub);margin-bottom:16px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.summary-row:last-child{border:none}
.sum-label{color:var(--sub)}
.sum-val{font-weight:600}
.sum-val.ok{color:var(--green)}
.sum-val.warn{color:var(--orange)}
.modal-btn{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:600;border:none;cursor:pointer;margin-top:16px}
.modal-btn-sec{background:transparent;border:1px solid var(--border);color:var(--text);margin-top:8px}
.empty{text-align:center;padding:28px 16px;color:var(--sub);font-size:14px}

/* Form ajout */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-group label{font-size:13px;font-weight:500;color:var(--sub)}
.form-group input,.form-group textarea,.form-group select{
  padding:11px 13px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);font-size:15px;
  font-family:inherit;width:100%;outline:none;transition:border .15s;
}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.form-group textarea{resize:none;height:72px;line-height:1.4}
.form-group select option{background:var(--card);color:var(--text)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div>
        <h1>🚗 Livraison Tesla Model Y</h1>
        <div class="subtitle">Appui court = OK · Appui long = Problème</div>
      </div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <div class="prog-label" id="prog-label">0 / 0 vérifiés</div>
  </div>
</header>

<div class="filter-row">
  <button class="ftag active" onclick="setFilter('all',this)">Tous</button>
  <button class="ftag" onclick="setFilter('ok',this)">✓ OK</button>
  <button class="ftag" onclick="setFilter('issue',this)">⚠ Problèmes</button>
  <button class="ftag" onclick="setFilter('pending',this)">En attente</button>
</div>

<main id="main"></main>

<div class="fab-group">
  <button class="fab fab-add" onclick="openAddModal(null)" title="Ajouter un contrôle">＋</button>
  <button class="fab fab-main" onclick="openSummary()" title="Résumé">☰</button>
</div>

<!-- Modal résumé -->
<div class="modal-bg" id="modal-summary" onclick="closeSummary(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Résumé de l'inspection</h2>
    <p id="sum-sub"></p>
    <div id="sum-body"></div>
    <button class="modal-btn" onclick="document.getElementById('modal-summary').classList.remove('open')">Fermer</button>
    <button class="modal-btn modal-btn-sec" onclick="resetAll()">Réinitialiser tout</button>
  </div>
</div>

<!-- Modal ajout contrôle -->
<div class="modal-bg" id="modal-add" onclick="closeAddModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="add-modal-title">Ajouter un contrôle</h2>
    <p>Ce point sera ajouté à ta checklist.</p>
    <div class="form-group">
      <label>Nom du contrôle *</label>
      <input type="text" id="add-label" placeholder="ex : Vérifier l'état du tapis de coffre" maxlength="80">
    </div>
    <div class="form-group">
      <label>Description (optionnel)</label>
      <textarea id="add-note" placeholder="ex : Contrôler les bords et la fixation"></textarea>
    </div>
    <div class="form-group">
      <label>Section</label>
      <select id="add-section"></select>
    </div>
    <button class="modal-btn" id="add-confirm-btn" onclick="confirmAdd()">Ajouter</button>
    <button class="modal-btn modal-btn-sec" onclick="document.getElementById('modal-add').classList.remove('open')">Annuler</button>
  </div>
</div>

<script>
const DEFAULT_SECTIONS = [
  { title:"Administratif", icon:"📋", items:[
    {l:"Commande et facture vérifiées", n:"Confirmer que la commande, la facture et le VIN reçus sont corrects"},
    {l:"Paiement réalisé", n:"Vérifier que le paiement a bien été pris en compte"},
    {l:"Assurance souscrite", n:"Couvrir le trajet retour dès la prise en main"},
    {l:"Documents d'identité et permis", n:"Avoir sur soi les documents nécessaires à la livraison"},
    {l:"VIN pare-brise = certificat", n:"Le numéro VIN gravé sur le pare-brise correspond au certificat de cession"},
    {l:"Plaques d'immatriculation", n:"Les 2 plaques sont correctes et bien fixées"},
    {l:"Bon de livraison signé", n:"Signer avec remarques éventuelles — ne pas signer sans avoir tout vérifié"},
    {l:"Carte grise", n:"Vérifier nom, adresse et VIN"},
    {l:"Facture & bonus écologique", n:"Vérifier le montant déduit si applicable"},
    {l:"Couleur et intérieur conformes", n:"Confirmer la teinte de carrosserie et la sellerie commandées"},
  ]},
  { title:"Extérieur", icon:"🚗", items:[
    {l:"Peinture côté conducteur", n:"Rayures, éclats, différence de teinte — utiliser l'ongle pour tester la profondeur"},
    {l:"Peinture côté passager", n:"Rayures, éclats, différence de teinte"},
    {l:"Peinture à l'avant", n:"Capot, bouclier avant, zone de charge"},
    {l:"Peinture à l'arrière", n:"Hayon, bouclier arrière"},
    {l:"Alignement des portes", n:"Jeux réguliers, pas de décalage visible"},
    {l:"Alignement des poignées", n:"Poignées escamotables bien alignées avec la carrosserie"},
    {l:"Alignement coffres avant et arrière", n:"Frunk et hayon alignés avec les ailes et la carrosserie"},
    {l:"Phares et feux alignés", n:"Bien intégrés dans la carrosserie, sans jeu excessif"},
    {l:"Phares et feux sans condensation", n:"Vérifier à l'intérieur des optiques"},
    {l:"Vitres et toit en verre", n:"Éclats, fissures, décollements de joint, étanchéité"},
    {l:"Bas de caisse et soubassement", n:"Se baisser pour inspecter les bas de caisse et le dessous"},
    {l:"Jantes et pneus", n:"Rayures sur jantes (transit), état des flancs, pression de gonflage"},
    {l:"Ouvertures portes/coffres non rayées", n:"Vérifier les bords des ouvertures, souvent touchés lors du transport"},
    {l:"Joints de portes", n:"État, souplesse, absence de déchirure"},
    {l:"Prise attelage (si option)", n:"Vérifier le bon fonctionnement de la prise électrique d'attelage"},
  ]},
  { title:"Intérieur", icon:"🪑", items:[
    {l:"Sièges — traces, taches, rayures", n:"Inspecter toutes les assises et dossiers"},
    {l:"Sièges — réglages électriques", n:"Tester le réglage électrique de tous les sièges"},
    {l:"Sièges chauffants / ventilés", n:"Tester toutes les options de confort thermique"},
    {l:"Volant — traces, taches, rayures", n:"Inspecter la jante, les branches et les commandes"},
    {l:"Volant — réglage électrique", n:"Vérifier le bon fonctionnement du réglage de position"},
    {l:"Commodos et commandes volant", n:"Tester tous les boutons et molettes au volant"},
    {l:"Plastiques et garnitures", n:"Aucune trace, tache ou rayure sur les surfaces intérieures"},
    {l:"Garnitures tissu", n:"Vérifier les habillages de portes et plafond"},
    {l:"Tapis de sol (2 AV + 1 AR)", n:"Présence des 3 tapis d'origine et bon état"},
    {l:"Rétroviseurs — ouverture/fermeture", n:"Repliage électrique fonctionnel"},
    {l:"4 vitres — montée/descente", n:"Tester chaque lève-vitre électrique"},
    {l:"Boîte à gants", n:"Ouverture, fermeture et état intérieur"},
    {l:"Plafonniers et miroirs de courtoisie", n:"Tester l'éclairage intérieur et les miroirs de pare-soleil"},
    {l:"Frunk (coffre avant)", n:"Alignement, ouverture/fermeture, état du revêtement intérieur"},
    {l:"Coffre arrière", n:"Cache-bagages, tiroir sous plancher, alignement hayon"},
  ]},
  { title:"Écran & application", icon:"📱", items:[
    {l:"Clés de carte (x2)", n:"Tester les 2 cartes — ouverture, fermeture, démarrage"},
    {l:"Voiture dans l'app Tesla", n:"App liée au véhicule, clé téléphone active"},
    {l:"Connexion 4G (icône LTE)", n:"Vérifier que la voiture est bien connectée au réseau"},
    {l:"Écrans réactifs et non rayés", n:"Tester la réactivité tactile, vérifier pixels morts et rayures"},
    {l:"Audio — radio et streaming", n:"Tester Radio, Spotify ou autre source"},
    {l:"Pas de grésillement à haut volume", n:"Monter le volume pour détecter tout défaut d'enceinte"},
    {l:"Micro et commande vocale", n:"Tester la reconnaissance vocale via le bouton au volant"},
    {l:"Caméras — latérales, avant, arrière", n:"Vérifier tous les flux caméras sur l'écran central"},
    {l:"GPS fonctionnel", n:"Lancer une navigation pour vérifier la géolocalisation"},
    {l:"Ports USB-C et USB-A", n:"Tester chaque port avec un câble"},
    {l:"Charge sans fil (Qi)", n:"Tester le pad de charge sans fil"},
    {l:"Prise 12V", n:"Vérifier le fonctionnement de la prise accessoire"},
    {l:"Climatisation / Chauffage", n:"Tester chaud et froid, vérifier tous les diffuseurs"},
    {l:"Autopilot / FSD", n:"Confirmer les options payantes activées dans le compte Tesla"},
    {l:"Version logicielle à jour", n:"Vérifier qu'aucune mise à jour n'est en attente"},
  ]},
  { title:"Accessoires fournis", icon:"📦", items:[
    {l:"2 cartes clés présentes", n:"Vérifier la présence et le bon fonctionnement des 2 cartes"},
    {l:"Câble de recharge Type 2", n:"Présence du câble dans le véhicule"},
    {l:"Connecteur mobile et adaptateur J1772", n:"Vérifier selon la version commandée"},
    {l:"Clé USB dans la boîte à gants", n:"Pour l'enregistrement Dashcam/Sentry Mode"},
    {l:"Trousse de secours rouge", n:"Vérifier sa présence dans le coffre"},
    {l:"Chargeur secteur 230V (si option)", n:"Vérifier si l'option a été commandée"},
    {l:"Attelage dans sa sacoche (si option)", n:"Vérifier si l'option a été commandée"},
  ]},
  { title:"Batterie & charge", icon:"⚡", items:[
    {l:"Niveau de charge à la livraison", n:"Idéalement ≥ 80 % — noter le kilométrage compteur"},
    {l:"Charge suffisante pour repartir", n:"S'assurer d'avoir assez d'autonomie pour le trajet retour"},
    {l:"Trappe de charge", n:"Ouverture/fermeture, connecteur propre sans dommage"},
    {l:"Test sur Superchargeur", n:"Brancher sur un Superchargeur pour vérifier la charge effective"},
    {l:"1re charge recommandée", n:"Préconditionner la batterie avant le 1er branchement à domicile"},
  ]},
];

const CUSTOM_SECTION = "Mes contrôles perso";
const CUSTOM_ICON = "✏️";

let sections = [];
let customItems = [];
let state = {};
let currentFilter = 'all';
let longPressTimer = null;
let editingCustomIdx = null;

function save() {
  try { localStorage.setItem('tesla_cl_state', JSON.stringify(state)); localStorage.setItem('tesla_cl_custom', JSON.stringify(customItems)); } catch(e){}
}
function load() {
  try { state = JSON.parse(localStorage.getItem('tesla_cl_state') || '{}'); customItems = JSON.parse(localStorage.getItem('tesla_cl_custom') || '[]'); } catch(e){ state={}; customItems=[]; }
  // Fallback : si localStorage vide ou indispo, les données par défaut suffisent
}

function buildSections() {
  sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
  if (customItems.length > 0) {
    sections.push({ title: CUSTOM_SECTION, icon: CUSTOM_ICON, custom: true, items: customItems.map(i => ({l:i.l, n:i.n||'', custom:true})) });
  }
}

function key(sec, item) { return sec + '||' + item; }
function getState(k) { return state[k] || 'none'; }
function setState(k, s) {
  if (s === 'none') delete state[k];
  else state[k] = s;
  save(); renderAll();
}

function allKeys() {
  const keys = [];
  sections.forEach(s => s.items.forEach(i => keys.push(key(s.title, i.l))));
  return keys;
}

function updateProgress() {
  const all = allKeys();
  const done = all.filter(k => state[k]).length;
  const pct = all.length ? Math.round(done/all.length*100) : 0;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done + ' / ' + all.length + ' vérifiés';
}

function renderAll() {
  buildSections();
  updateProgress();
  const main = document.getElementById('main');
  main.innerHTML = '';

  sections.forEach(sec => {
    const filtered = sec.items.filter(i => {
      const s = getState(key(sec.title, i.l));
      if (currentFilter === 'ok') return s === 'ok';
      if (currentFilter === 'issue') return s === 'issue';
      if (currentFilter === 'pending') return s === 'none';
      return true;
    });

    // On affiche toujours la section perso même vide pour pouvoir ajouter
    const isCustom = !!sec.custom;
    if (!isCustom && filtered.length === 0) return;

    const okCount = sec.items.filter(i => getState(key(sec.title, i.l)) === 'ok').length;
    const issueCount = sec.items.filter(i => getState(key(sec.title, i.l)) === 'issue').length;
    const allDone = sec.items.length > 0 && okCount === sec.items.length;

    const card = document.createElement('div');
    card.className = 'section-card';

    let badges = '';
    if (allDone) badges += `<span class="badge badge-ok">Complet</span>`;
    if (issueCount > 0) badges += `<span class="badge badge-warn">${issueCount} pb</span>`;

    const headerClass = isCustom ? 'sec-header custom-sec-header' : 'sec-header';
    card.innerHTML = `<div class="${headerClass}">
      <div class="sec-title">${sec.icon} ${sec.title}</div>
      <div style="display:flex;gap:4px">${badges}</div>
    </div><div class="items-wrap"></div>`;
    main.appendChild(card);

    const wrap = card.querySelector('.items-wrap');

    filtered.forEach((item, idx) => {
      const k = key(sec.title, item.l);
      const s = getState(k);
      const realIdx = customItems.findIndex(ci => ci.l === item.l);
      const el = document.createElement('div');
      el.className = 'item' + (s === 'ok' ? ' ok' : s === 'issue' ? ' issue' : '');
      const delBtn = isCustom ? `<button class="act-btn act-del" onclick="event.stopPropagation();deleteCustom(${realIdx})">Supprimer</button>` : '';
      const editBtn = isCustom ? `<button class="act-btn act-reset" onclick="event.stopPropagation();openEditCustom(${realIdx})">Modifier</button>` : '';
      el.innerHTML = `<div class="cb"><span class="cb-inner">${s === 'issue' ? '!' : '✓'}</span></div>
        <div class="item-text">
          <div class="item-label">${item.l}</div>
          ${item.n ? `<div class="item-note">${item.n}</div>` : ''}
          ${s !== 'none' ? `<div class="item-actions">
            ${s !== 'ok' ? `<button class="act-btn act-ok" onclick="event.stopPropagation();setS('${k}','ok')">✓ OK</button>` : ''}
            ${s !== 'issue' ? `<button class="act-btn act-issue" onclick="event.stopPropagation();setS('${k}','issue')">⚠ Problème</button>` : ''}
            <button class="act-btn act-reset" onclick="event.stopPropagation();setS('${k}','none')">Effacer</button>
            ${editBtn}${delBtn}
          </div>` : isCustom ? `<div class="item-actions">${editBtn}${delBtn}</div>` : ''}
        </div>`;

      el.addEventListener('touchstart', () => { longPressTimer = setTimeout(() => { setState(k,'issue'); vibrate(); }, 600); }, {passive:true});
      el.addEventListener('touchend', () => clearTimeout(longPressTimer));
      el.addEventListener('touchmove', () => clearTimeout(longPressTimer));
      el.addEventListener('mousedown', () => { longPressTimer = setTimeout(() => setState(k,'issue'), 600); });
      el.addEventListener('mouseup', () => clearTimeout(longPressTimer));
      el.addEventListener('click', () => {
        clearTimeout(longPressTimer);
        const cur = getState(k);
        if (cur === 'none') setState(k,'ok');
        else if (cur === 'ok') setState(k,'none');
      });
      wrap.appendChild(el);
    });

    // Bouton + ajouter dans chaque section
    const addRow = document.createElement('div');
    addRow.className = 'add-item-row';
    addRow.innerHTML = `<span class="plus">＋</span> Ajouter un contrôle ici`;
    addRow.onclick = () => openAddModal(sec.title);
    wrap.appendChild(addRow);
  });

  // Si section perso pas encore créée, on propose quand même le bouton global
  if (main.innerHTML === '' || (!sections.find(s=>s.custom) && currentFilter !== 'all')) {
    if (currentFilter !== 'all') {
      main.innerHTML = '<div class="empty">Aucun élément dans cette catégorie.</div>';
    }
  }
}

function setS(k, s) { setState(k, s); }
function vibrate() { if (navigator.vibrate) navigator.vibrate(30); }
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.ftag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ---- Modal ajout/édition ----
function populateSectionSelect(preselect) {
  const sel = document.getElementById('add-section');
  sel.innerHTML = '';
  const names = [...DEFAULT_SECTIONS.map(s=>s.title), CUSTOM_SECTION];
  names.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    opt.textContent = n === CUSTOM_SECTION ? '✏️ ' + CUSTOM_SECTION : n;
    if (n === (preselect || CUSTOM_SECTION)) opt.selected = true;
    sel.appendChild(opt);
  });
}

function openAddModal(sectionTitle) {
  editingCustomIdx = null;
  document.getElementById('add-modal-title').textContent = 'Ajouter un contrôle';
  document.getElementById('add-label').value = '';
  document.getElementById('add-note').value = '';
  populateSectionSelect(sectionTitle);
  document.getElementById('add-confirm-btn').textContent = 'Ajouter';
  document.getElementById('modal-add').classList.add('open');
  setTimeout(() => document.getElementById('add-label').focus(), 350);
}

function openEditCustom(idx) {
  editingCustomIdx = idx;
  const item = customItems[idx];
  document.getElementById('add-modal-title').textContent = 'Modifier le contrôle';
  document.getElementById('add-label').value = item.l;
  document.getElementById('add-note').value = item.n || '';
  populateSectionSelect(item.section || CUSTOM_SECTION);
  document.getElementById('add-section').value = item.section || CUSTOM_SECTION;
  document.getElementById('add-confirm-btn').textContent = 'Enregistrer';
  document.getElementById('modal-add').classList.add('open');
  setTimeout(() => document.getElementById('add-label').focus(), 350);
}

function confirmAdd() {
  const label = document.getElementById('add-label').value.trim();
  const note = document.getElementById('add-note').value.trim();
  const section = document.getElementById('add-section').value;
  if (!label) {
    document.getElementById('add-label').style.borderColor = '#d32f2f';
    document.getElementById('add-label').focus();
    return;
  }
  document.getElementById('add-label').style.borderColor = '';

  if (editingCustomIdx !== null) {
    // Supprimer l'ancienne clé d'état si le label change
    const old = customItems[editingCustomIdx];
    const oldKey = key(old.section || CUSTOM_SECTION, old.l);
    const oldState = state[oldKey];
    delete state[oldKey];
    customItems[editingCustomIdx] = { l: label, n: note, section };
    if (oldState) state[key(section, label)] = oldState;
  } else {
    // Vérifier doublon
    const exists = customItems.some(i => i.l === label && (i.section||CUSTOM_SECTION) === section);
    if (exists) {
      document.getElementById('add-label').style.borderColor = '#d32f2f';
      return;
    }
    customItems.push({ l: label, n: note, section });
  }

  save();
  document.getElementById('modal-add').classList.remove('open');
  renderAll();
  vibrate();
}

function deleteCustom(idx) {
  const item = customItems[idx];
  const k = key(item.section || CUSTOM_SECTION, item.l);
  delete state[k];
  customItems.splice(idx, 1);
  save();
  renderAll();
}

function closeAddModal(e) {
  if (e.target === document.getElementById('modal-add')) document.getElementById('modal-add').classList.remove('open');
}

// ---- Résumé ----
function openSummary() {
  buildSections();
  const all = allKeys();
  const ok = all.filter(k => state[k] === 'ok').length;
  const issues = all.filter(k => state[k] === 'issue');
  const pending = all.filter(k => !state[k]).length;
  document.getElementById('sum-sub').textContent = `${ok + issues.length} / ${all.length} points vérifiés`;
  let body = `<div class="summary-row"><span class="sum-label">✓ Points OK</span><span class="sum-val ok">${ok}</span></div>
    <div class="summary-row"><span class="sum-label">⚠ Problèmes</span><span class="sum-val warn">${issues.length}</span></div>
    <div class="summary-row"><span class="sum-label">En attente</span><span class="sum-val">${pending}</span></div>`;
  if (issues.length > 0) {
    body += `<div style="margin-top:12px;font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Détail des problèmes</div>`;
    issues.forEach(k => {
      const [sec, item] = k.split('||');
      body += `<div class="summary-row"><span class="sum-label">${item}</span><span style="font-size:11px;color:var(--sub)">${sec}</span></div>`;
    });
  }
  document.getElementById('sum-body').innerHTML = body;
  document.getElementById('modal-summary').classList.add('open');
}
function closeSummary(e) {
  if (e.target === document.getElementById('modal-summary')) document.getElementById('modal-summary').classList.remove('open');
}

function resetAll() {
  if (!confirm('Réinitialiser tous les contrôles ? Les contrôles personnalisés seront conservés.')) return;
  Object.keys(state).forEach(k => delete state[k]);
  save();
  document.getElementById('modal-summary').classList.remove('open');
  renderAll();
}

load();
renderAll();
</script>
